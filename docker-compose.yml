services:
  db:
    image: postgres:17-alpine
    container_name: wedosoftware-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedosoftware}
      POSTGRES_USER: ${POSTGRES_USER:-wedosoftware}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedosoftware_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wedosoftware} -d ${POSTGRES_DB:-wedosoftware}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedosoftware-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-wedosoftware};Username=${POSTGRES_USER:-wedosoftware};Password=${POSTGRES_PASSWORD:-wedosoftware_dev_pw}"
      Cors__AllowedOrigins__0: "http://localhost:4200"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
