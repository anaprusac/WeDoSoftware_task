server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular routes are handled client-side; unknown paths fall back to index.html so the
    # router (not nginx) resolves them. The API is reached directly by the browser at
    # environment.apiUrl (host-exposed port), so no proxying is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed JS/CSS bundles are safe to cache aggressively; index.html must always revalidate.
    location ~* \.(?:js|css|woff2?|ttf|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # i18n JSON has a stable path (unlike the hashed JS/CSS bundles above), so a browser's default
    # heuristic caching could keep serving an old translation file indefinitely after a deploy,
    # which shows up as raw "auth.someKey" text for any key added after that cached copy was taken.
    location ~* ^/i18n/.*\.json$ {
        add_header Cache-Control "no-cache";
    }
}
