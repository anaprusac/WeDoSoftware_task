<div class="menu-backdrop" (click)="close.emit()"></div>

<nav class="menu" aria-label="Main menu">
  <div class="menu__brand">
    <span class="menu__brand-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9v6M8 7v10M16 7v10M20 9v6M8 12h8" />
      </svg>
    </span>
    <span class="menu__brand-text">{{ 'app.tagline' | translate }}</span>
  </div>

  <ul class="menu__list">
    <li>
      <a routerLink="/home" routerLinkActive="menu__link--active" class="menu__link" (click)="close.emit()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5" /><path d="M5 9.5V21h14V9.5" /></svg>
        {{ 'nav.home' | translate }}
      </a>
    </li>
    <li>
      <a routerLink="/home" class="menu__link" (click)="close.emit()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
        {{ 'nav.findWorkout' | translate }}
      </a>
    </li>
    <li>
      <a routerLink="/statistics" routerLinkActive="menu__link--active" class="menu__link" (click)="close.emit()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2" /></svg>
        {{ 'nav.statistics' | translate }}
      </a>
    </li>
    <li>
      <a routerLink="/profile" routerLinkActive="menu__link--active" class="menu__link" (click)="close.emit()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4" /><path d="M4 21c0-4 4-6 8-6s8 2 8 6" /></svg>
        {{ 'nav.profile' | translate }}
      </a>
    </li>
  </ul>

  <button type="button" class="menu__logout" (click)="logout()">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l-5-5 5-5M15 12H5" /></svg>
    {{ 'nav.logout' | translate }}
  </button>
</nav>
