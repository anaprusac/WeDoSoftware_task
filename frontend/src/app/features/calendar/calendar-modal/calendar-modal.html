<app-modal (close)="close.emit()">
  <div class="cal">
    <div class="cal__header">
      <button type="button" class="cal__nav" (click)="prevMonth()" [disabled]="loading()" [attr.aria-label]="'calendar.prevMonth' | translate">‹</button>
      <div class="cal__title">
        <select class="cal__select cal__select--month" (change)="onMonthChange($any($event.target).value)" [attr.aria-label]="'calendar.month' | translate">
          @for (option of months(); track option.value) {
            <option [value]="option.value" [selected]="option.value === month()">{{ option.label }}</option>
          }
        </select>
        <select class="cal__select" (change)="onYearChange($any($event.target).value)" [attr.aria-label]="'calendar.year' | translate">
          @for (y of years; track y) {
            <option [value]="y" [selected]="y === year()">{{ y }}</option>
          }
        </select>
      </div>
      <button type="button" class="cal__nav" (click)="nextMonth()" [disabled]="loading() || !canGoNext()" [attr.aria-label]="'calendar.nextMonth' | translate">›</button>
    </div>

    <div class="cal__grid">
      @for (weekday of weekdays(); track $index) {
        <span class="cal__weekday">{{ weekday }}</span>
      }
    </div>

    <div class="cal__grid">
      @for (cell of cells(); track $index) {
        @if (cell) {
          <button
            type="button"
            class="cal__day"
            [class.cal__day--has]="cell.hasWorkout"
            [class.cal__day--today]="cell.isToday"
            [disabled]="!cell.clickable"
            (click)="select(cell)"
          >
            {{ cell.day }}
          </button>
        } @else {
          <span class="cal__day cal__day--empty"></span>
        }
      }
    </div>

    <p class="cal__hint">{{ 'calendar.hint' | translate }}</p>
  </div>
</app-modal>
