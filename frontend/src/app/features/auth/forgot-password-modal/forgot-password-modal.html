<app-modal variant="auth" [title]="'auth.forgotTitle' | translate" (close)="close.emit()">
  <form class="forgot" [formGroup]="form" (ngSubmit)="submit()">
    <p class="forgot__message">{{ 'auth.forgotMessage' | translate }}</p>
    <div class="forgot__row">
      <label class="forgot__label" for="forgot-username">{{ 'auth.usernameOrEmailPlaceholder' | translate }}:</label>
      <input id="forgot-username" class="text-input forgot__input" type="text" formControlName="usernameOrEmail" autocomplete="username" />
      <button type="submit" class="forgot__submit" [disabled]="submitting()">{{ 'auth.reset' | translate }}</button>
    </div>
  </form>
</app-modal>
