<div class="login">
  <div class="auth-toolbar">
    <app-theme-toggle />
    <app-language-switcher />
  </div>

  <section class="welcome">
    <h1 class="welcome__title">{{ 'auth.welcome' | translate }}</h1>
    <h2 class="welcome__subtitle">{{ 'auth.workSmarter' | translate }}</h2>
    <p class="welcome__text">{{ 'auth.keepTrack' | translate }}</p>
  </section>

  <div class="signin auth-card">
    <h2 class="signin__title">{{ 'auth.signIn' | translate }}</h2>

    <form class="signin__form" [formGroup]="form" (ngSubmit)="submit()">
      <input
        class="text-input signin__field"
        type="text"
        formControlName="usernameOrEmail"
        [placeholder]="'auth.usernameOrEmailPlaceholder' | translate"
        [attr.aria-label]="'auth.usernameOrEmailPlaceholder' | translate"
        autocomplete="username"
      />
      <div class="signin__password-group">
        <input
          class="text-input signin__field"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          [placeholder]="'auth.password' | translate"
          [attr.aria-label]="'auth.password' | translate"
          autocomplete="current-password"
        />
        <button
          type="button"
          class="signin__password-toggle"
          (click)="toggleShowPassword()"
          [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
        >
          @if (!showPassword()) {
            <svg class="signin__password-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
            </svg>
          } @else {
            <svg class="signin__password-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 001 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm7.31-7.31l.42.42c.9-.23 1.82-.35 2.74-.35 5 0 9.27 3.11 11 7.5-.69 1.86-1.88 3.5-3.43 4.75l.42.42 1.41-1.41L8.83 1.47 7.42 2.88z" />
            </svg>
          }
        </button>
      </div>

      @if (errorKey()) {
        <p class="signin__error">{{ errorKey()! | translate }}</p>
      }

      <button type="button" class="signin__link" (click)="openForgot()">{{ 'auth.forgotPassword' | translate }}</button>

      <button type="submit" class="signin__submit" [disabled]="submitting()">{{ 'auth.signInAction' | translate }}</button>

      <button type="button" class="signin__link" (click)="openRegister()">{{ 'auth.newHere' | translate }}</button>
    </form>
  </div>
</div>

@if (showRegister()) {
  <app-register-modal (close)="showRegister.set(false)" (registered)="onRegistered()" />
}
@if (showForgot()) {
  <app-forgot-password-modal (close)="showForgot.set(false)" />
}
