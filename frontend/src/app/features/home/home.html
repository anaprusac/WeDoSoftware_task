<div class="home">
  <a class="action" routerLink="/workouts/add">
    <span class="action__plus" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14" /></svg>
    </span>
    <span class="action__label">{{ 'home.addWorkout' | translate }}</span>
  </a>

  <button type="button" class="action" (click)="calendarOpen.set(true)">
    <span class="action__label">{{ 'home.findWorkout' | translate }}</span>
    <span class="action__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M16 2v4M8 2v4M3 10h18" /></svg>
    </span>
  </button>

  @if (!loaded()) {
    <p class="loading-text">{{ 'common.loading' | translate }}</p>
  } @else {
    @for (workout of workouts(); track workout.id) {
      <app-workout-card [workout]="workout" />
    }

    @if (workouts().length === 0) {
      <p class="home__empty">{{ 'home.noWorkouts' | translate }}</p>
    }
  }
</div>

@if (calendarOpen()) {
  <app-calendar-modal (close)="calendarOpen.set(false)" />
}
