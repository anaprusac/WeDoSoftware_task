@switch (type()) {
  @case ('Cardio') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 20s-7-4.4-9.5-8.9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 5.1C19 15.6 12 20 12 20Z" />
      <path d="M3.5 12h3l2 4 3-8 2 4h4.5" />
    </svg>
  }
  @case ('Strength') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="4.5" cy="12" r="2.5" />
      <circle cx="19.5" cy="12" r="2.5" />
      <path d="M7 12h10" />
      <path d="M4.5 9.5v5M19.5 9.5v5" />
    </svg>
  }
  @case ('MobilityFlexibility') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

      <path d="M8 4.5 12 8l4-3.5" />
      <path d="M9 20l3-8 3 8" />

  }
  @case ('Rehabilitation') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9" />
      <path d="M12 8v8M8 12h8" />
    </svg>
  }
  @case ('FullBody') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="5" r="2" />

      <path d="M12 9 7 6M12 9l5-3" />
      <path d="M12 14l-4 6M12 14l4 6" />

  }
  @case ('UpperBody') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 20v-6" />

      <path d="M15.8 7.2 19 5" />

  }
  @case ('LowerBody') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 4h8" />

      <path d="M14 4v7l3 9" />
      <path d="M6.3 20h2.6M15.1 20h2.6" />
    </svg>
  }
  @case ('Core') {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="8" y="5" width="8" height="14" rx="3" />
      <path d="M8 9.5h8M8 13.5h8" />
      <path d="M12 5v14" />

  }
  @default {
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3v18M4.5 7.5l15 9M19.5 7.5l-15 9" />
