<article class="wcard">
  <header class="wcard__header">{{ dateLabel() }}</header>
  <div class="wcard__body">
    <div class="wcard__top">
      <span class="wcard__type">
        <app-workout-type-icon [type]="workout().type" class="wcard__type-icon" />
        {{ 'workoutType.' + workout().type | translate }}
      </span>
      <span class="wcard__duration">{{ duration() }}</span>
    </div>
    <div class="wcard__metrics">
      <div class="wcard__metric">
        <span class="wcard__metric-value">{{ workout().intensity }}<span class="wcard__metric-scale">/10</span></span>
        <span class="wcard__metric-label">{{ 'workout.intensity' | translate }}</span>
      </div>
      <div class="wcard__metric">
        <span class="wcard__metric-value">{{ workout().tiredness }}<span class="wcard__metric-scale">/10</span></span>
        <span class="wcard__metric-label">{{ 'workout.tiredness' | translate }}</span>
      </div>
    </div>

    <a
      class="wcard__view"
      [routerLink]="['/workouts/date', dateParam()]"
      [queryParams]="{ highlight: workout().id }"
      [attr.aria-label]="'workout.viewDetail' | translate"
    >
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7" />
        <path d="m21 21-4.3-4.3" />
      </svg>
    </a>
  </div>
</article>
