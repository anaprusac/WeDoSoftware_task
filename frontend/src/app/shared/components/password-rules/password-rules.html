<ul class="rules" aria-live="polite">
  @for (rule of rules(); track rule.key) {
    <li class="rules__item" [class.rules__item--met]="rule.met">
      <span class="rules__icon" aria-hidden="true">
        @if (rule.met) {
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5" /></svg>
        } @else {
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none" /></svg>
        }
      </span>
      {{ rule.key | translate }}
    </li>
  }
</ul>
